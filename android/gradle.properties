org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Flutter template flags
android.newDsl=false
android.builtInKotlin=false

# Disable Kotlin incremental compilation (fixes cross-drive cache issue)
kotlin.incremental=false
kotlin.incremental.multiplatform=false
kotlin.incremental.js=false
kotlin.incremental.native=false

# Suppress AAR metadata compileSdk version check
# geocoding_android 3.3.1 uses compileSdk 33 internally
# This allows build to proceed without blocking on metadata check
android.suppressUnsupportedCompileSdk=34