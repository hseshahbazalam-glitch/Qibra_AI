name: qibra_ai
description: Qibra AI - AI Powered Islamic Assistant
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── UI & FONTS ───────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # ─── STATE MANAGEMENT ─────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ─── NAVIGATION ───────────────────────────────────────────
  go_router: ^14.2.0

  # ─── DEPENDENCY INJECTION ─────────────────────────────────
  get_it: ^7.7.0

  # ─── NETWORKING ───────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ─── STORAGE ──────────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ─── FIREBASE ─────────────────────────────────────────────
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0

  # ─── LOCATION & PRAYER TIMES ──────────────────────────────
  geolocator: ^11.1.0
  hijri: ^3.0.1

  # ─── AUDIO (QURAN PLAYER) ─────────────────────────────────
  audioplayers: ^6.1.0
  path_provider: ^2.1.3

  # ─── PERMISSIONS ──────────────────────────────────────────
  permission_handler: ^11.3.1

  # ─── APP INFO ─────────────────────────────────────────────
  package_info_plus: ^8.0.2

  # ─── UTILITIES ────────────────────────────────────────────
  equatable: ^2.0.5
  json_annotation: ^4.9.0

  # ─── AI (GEMINI) ──────────────────────────────────────────
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.1.0
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.1
  flutter_markdown: ^0.7.7+1
  quran: ^1.3.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/hero/
    - assets/images/calligraphy/
    - assets/images/features/
    - assets/images/illustrations/
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/patterns/
    - assets/images/quran/
    - assets/icons/
    - assets/data/quran/
    - assets/data/tafseer/
    - assets/data/tafseer/ibn_kathir_urdu/
    - assets/data/hadith/
    - assets/data/hadith/bukhari/
    - assets/data/hadith/muslim/
    - assets/data/hadith/abudawud/
    - assets/data/hadith/tirmidhi/
    - assets/data/hadith/nasai/
    - assets/data/hadith/ibnmajah/
    - assets/animations/
    - assets/lottie/
    # ============================================================
# APP ICON CONFIGURATION
# ============================================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/qibra_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D3320"
  adaptive_icon_foreground: "assets/images/logo/qibra_logo.png"
  remove_alpha_ios: true

# ============================================================
# SPLASH SCREEN CONFIGURATION
# ============================================================
flutter_native_splash:
  color: "#020A08"
  image: assets/images/logo/qibra_logo.png
  
  android_12:
    image: assets/images/logo/qibra_logo.png
    color: "#020A08"
    icon_background_color: "#0D3320"
  
  android: true
  ios: true